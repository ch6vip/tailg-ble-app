<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台铃 · 车辆定位 v8</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg-top:#E9EEF4; --bg-bot:#F6F8FB; --card:#FFFFFF; --card-2:#F2F5F8; --card-3:#E8ECF1;
      --hairline:rgba(15,22,32,0.07); --hairline-2:rgba(15,22,32,0.10);
      --energy:#00C896; --energy-deep:#00A57C; --energy-soft:rgba(0,200,150,0.12);
      --ink-btn:#1B2230; --ink-btn-2:#2A3342;
      --amber:#F5A623; --amber-soft:rgba(245,166,35,0.14);
      --red:#FF4D5E; --red-soft:rgba(255,77,94,0.12);
      --violet:#7C6CFF; --violet-soft:rgba(124,108,255,0.14);
      --sky:#2E9BFF; --sky-soft:rgba(46,155,255,0.14);
      --t-1:#0F1620; --t-2:#5A6472; --t-3:#98A1AE;
      --r-sm:14px; --r-md:20px; --r-lg:26px; --r-xl:32px; --r-pill:999px;
      --shadow-card:0 12px 36px rgba(24,39,64,0.10);
      --shadow-btn:0 8px 20px rgba(27,34,48,0.28);
      --ease:cubic-bezier(.4,.0,.2,1); --ease-out:cubic-bezier(.16,1,.3,1);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      background:#cfd6df; color:var(--t-1); display:flex; justify-content:center; min-height:100vh;
      -webkit-font-smoothing:antialiased;}
    .phone{position:relative; width:390px; min-height:844px; height:844px;
      background:linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 46%); overflow:hidden;}

    .statusbar{position:absolute; top:0; left:0; right:0; z-index:20;
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 24px 4px; font-size:13px; font-weight:600; color:var(--t-1);}
    .statusbar .ico{display:flex; gap:6px; align-items:center; font-size:12px;}

    /* ── 地图层 ── */
    .map{position:absolute; inset:0; height:560px; overflow:hidden;
      background:
        radial-gradient(120% 80% at 50% -10%, #DCEBE4 0%, transparent 55%),
        linear-gradient(160deg, #E4EBF1 0%, #EDF1F5 60%, #E8EEF3 100%);}
    .map svg.roads{position:absolute; inset:0; width:100%; height:100%;}
    .map .park{position:absolute; border-radius:40% 60% 55% 45%/55% 45% 60% 40%;
      background:rgba(0,200,150,0.10);}
    .map .water{position:absolute; border-radius:50% 40% 45% 55%/40% 55% 45% 60%;
      background:rgba(46,155,255,0.12);}

    /* 车辆定位针 */
    .pin{position:absolute; top:236px; left:50%; transform:translate(-50%,-100%); z-index:6;}
    .pin .pulse{position:absolute; left:50%; top:46px; width:70px; height:70px;
      transform:translate(-50%,-50%); border-radius:50%; background:rgba(0,200,150,0.22);
      animation:pulse 2.2s var(--ease) infinite;}
    @keyframes pulse{0%{transform:translate(-50%,-50%) scale(.4);opacity:.9;}
      100%{transform:translate(-50%,-50%) scale(1.5);opacity:0;}}
    .pin .drop{position:relative; width:46px; height:46px; border-radius:50% 50% 50% 0;
      transform:rotate(-45deg); background:linear-gradient(135deg,var(--energy),var(--energy-deep));
      box-shadow:0 8px 18px rgba(0,165,124,0.45); display:grid; place-items:center;}
    .pin .drop svg{width:22px; height:22px; transform:rotate(45deg); stroke:#fff; fill:none;
      stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
    .pin .dot-shadow{position:absolute; left:50%; top:50px; width:20px; height:6px;
      transform:translateX(-50%); border-radius:50%; background:rgba(24,39,64,0.22); filter:blur(2px);}

    /* 顶部返回 + 标题 */
    .topbar{position:absolute; top:52px; left:0; right:0; z-index:15;
      display:flex; align-items:center; gap:12px; padding:0 18px;}
    .circ-btn{width:40px; height:40px; border-radius:50%; display:grid; place-items:center;
      background:var(--card); border:1px solid var(--hairline); color:var(--t-1);
      box-shadow:0 4px 14px rgba(24,39,64,0.12); transition:transform .14s var(--ease);}
    .circ-btn:active{transform:scale(.92);}
    .circ-btn svg{width:19px; height:19px; stroke:var(--t-1); fill:none; stroke-width:2;
      stroke-linecap:round; stroke-linejoin:round;}
    .topbar .ttl{font-size:17px; font-weight:800; color:var(--t-1);
      background:var(--card); padding:9px 16px; border-radius:var(--r-pill);
      box-shadow:0 4px 14px rgba(24,39,64,0.10);}

    /* 地图右侧悬浮工具 */
    .map-tools{position:absolute; right:18px; top:300px; z-index:12;
      display:flex; flex-direction:column; gap:10px;}
    .map-tools .circ-btn svg{stroke:var(--t-2);}

    /* ── 底部信息卡 ── */
    .info-sheet{position:absolute; left:0; right:0; bottom:0; z-index:14;
      background:var(--card); border-radius:var(--r-xl) var(--r-xl) 0 0;
      box-shadow:0 -8px 36px rgba(24,39,64,0.14); padding:18px 20px 104px;}
    .grip{width:38px; height:4px; border-radius:2px; background:var(--card-3); margin:0 auto 16px;}
    .loc-head{display:flex; align-items:flex-start; gap:12px; margin-bottom:16px;}
    .loc-head .lh-ic{width:44px; height:44px; border-radius:14px; flex:0 0 auto; display:grid; place-items:center;
      background:var(--energy-soft);}
    .loc-head .lh-ic svg{width:23px; height:23px; stroke:var(--energy-deep); fill:none; stroke-width:1.9;
      stroke-linecap:round; stroke-linejoin:round;}
    .loc-head .lh-body{flex:1; min-width:0;}
    .loc-head .lh-title{font-size:17px; font-weight:800; color:var(--t-1);}
    .loc-head .lh-addr{font-size:13px; color:var(--t-2); margin-top:3px; line-height:1.4;}
    .loc-head .lh-tag{display:inline-flex; align-items:center; gap:5px; margin-top:8px;
      padding:4px 10px; border-radius:var(--r-pill); background:var(--energy-soft);
      font-size:11.5px; font-weight:700; color:var(--energy-deep);}
    .loc-head .lh-tag .d{width:6px;height:6px;border-radius:50%;background:var(--energy);
      box-shadow:0 0 6px var(--energy);}

    .loc-meta{display:flex; gap:10px; margin-bottom:18px;}
    .meta-box{flex:1; background:var(--card-2); border-radius:var(--r-md); padding:13px 14px;
      border:1px solid var(--hairline);}
    .meta-box .m-num{font-size:19px; font-weight:800; color:var(--t-1); letter-spacing:-.3px;}
    .meta-box .m-num small{font-size:12px; font-weight:700; color:var(--t-2);}
    .meta-box .m-lab{font-size:11.5px; color:var(--t-3); margin-top:3px;}

    .loc-actions{display:flex; gap:12px;}
    .act-btn{flex:1; height:50px; border-radius:var(--r-md); display:flex; align-items:center;
      justify-content:center; gap:8px; font-size:15px; font-weight:700;
      transition:transform .14s var(--ease);}
    .act-btn:active{transform:scale(.96);}
    .act-btn svg{width:19px; height:19px; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
    .act-btn.primary{background:linear-gradient(135deg,var(--ink-btn-2),var(--ink-btn)); color:#fff;
      box-shadow:var(--shadow-btn);}
    .act-btn.primary svg{stroke:#fff;}
    .act-btn.ghost{background:var(--card-2); color:var(--t-1); border:1px solid var(--hairline);}
    .act-btn.ghost svg{stroke:var(--t-1);}

    /* ── 底部导航 ── */
    .nav{position:absolute; left:0; right:0; bottom:0; height:84px; z-index:30;
      display:flex; align-items:flex-start; justify-content:center; pointer-events:none;}
    .nav-inner{margin-top:10px; width:340px; height:60px; pointer-events:auto;
      background:rgba(255,255,255,0.92); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      border:1px solid var(--hairline); border-radius:22px;
      display:flex; align-items:center; justify-content:space-around; padding:0 8px;
      box-shadow:var(--shadow-card);}
    .nav-item{display:flex; flex-direction:column; align-items:center; gap:4px;
      color:var(--t-3); font-size:11px; font-weight:600; flex:1; padding:8px 0; text-decoration:none;}
    .nav-item svg{width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.9;
      stroke-linecap:round; stroke-linejoin:round;}
    .nav-item.on{color:var(--energy-deep);}

    .toast{position:absolute; top:104px; left:50%; transform:translateX(-50%) translateY(-80px);
      background:var(--ink-btn); color:#fff; padding:11px 18px; border-radius:var(--r-pill);
      font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px;
      box-shadow:0 12px 30px rgba(24,39,64,0.3); opacity:0;
      transition:all .35s var(--ease-out); z-index:50; pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0); opacity:1;}
    .toast .tdot{width:8px;height:8px;border-radius:50%;background:var(--energy);box-shadow:0 0 8px var(--energy);}
  </style>
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span class="ico">5G &nbsp; ▮▮▮ &nbsp; 84%</span></div>

    <!-- 地图 -->
    <div class="map">
      <div class="park" style="width:150px;height:120px;top:90px;left:-30px;"></div>
      <div class="park" style="width:110px;height:90px;top:330px;right:-20px;"></div>
      <div class="water" style="width:130px;height:100px;top:420px;left:40px;"></div>
      <svg class="roads" viewBox="0 0 390 560" preserveAspectRatio="none">
        <path d="M-20 180 L420 240" stroke="#fff" stroke-width="22" fill="none" opacity=".9"/>
        <path d="M-20 180 L420 240" stroke="#D5DCE4" stroke-width="22" fill="none" stroke-dasharray="2 16" opacity=".7"/>
        <path d="M120 -20 L180 600" stroke="#fff" stroke-width="26" fill="none" opacity=".9"/>
        <path d="M260 -20 L300 600" stroke="#fff" stroke-width="16" fill="none" opacity=".8"/>
        <path d="M-20 400 L420 440" stroke="#fff" stroke-width="14" fill="none" opacity=".8"/>
      </svg>
    </div>

    <!-- 顶部 -->
    <div class="topbar">
      <a class="circ-btn" href="home_v8_ninebot.html"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></a>
      <span class="ttl">车辆定位</span>
    </div>

    <!-- 定位针 -->
    <div class="pin">
      <div class="pulse"></div>
      <div class="drop"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></div>
      <div class="dot-shadow"></div>
    </div>

    <!-- 地图工具 -->
    <div class="map-tools">
      <div class="circ-btn" data-name="图层"><svg viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div class="circ-btn" data-name="回到车辆"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></div>
    </div>

    <!-- 底部信息卡 -->
    <div class="info-sheet">
      <div class="grip"></div>
      <div class="loc-head">
        <div class="lh-ic"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <div class="lh-body">
          <div class="lh-title">台铃 N8</div>
          <div class="lh-addr">浙江省杭州市西湖区文三路 478 号 · 华星科技大厦</div>
          <span class="lh-tag"><span class="d"></span>定位精准 · GPS 已锁定</span>
        </div>
      </div>
      <div class="loc-meta">
        <div class="meta-box"><div class="m-num">320 <small>m</small></div><div class="m-lab">距你的位置</div></div>
        <div class="meta-box"><div class="m-num">2 <small>分钟前</small></div><div class="m-lab">最近更新</div></div>
        <div class="meta-box"><div class="m-num">±5 <small>m</small></div><div class="m-lab">定位精度</div></div>
      </div>
      <div class="loc-actions">
        <div class="act-btn ghost" data-name="刷新定位"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4"/></svg>刷新</div>
        <div class="act-btn primary" data-name="导航过去"><svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>导航过去</div>
      </div>
    </div>

    <!-- 底部导航 -->
    <div class="nav">
      <div class="nav-inner">
        <a class="nav-item" href="home_v8_ninebot.html"><svg viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>控车</a>
        <a class="nav-item on" href="locate_v8.html"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>定位</a>
        <a class="nav-item" href="garage_v8.html"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>车库</a>
        <a class="nav-item" href="profile_v8.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>我的</a>
      </div>
    </div>

    <div class="toast" id="toast"><span class="tdot"></span><span id="toastMsg"></span></div>
  </div>

  <script>
    const toast=document.getElementById('toast'), toastMsg=document.getElementById('toastMsg'); let tt;
    function showToast(m){toastMsg.textContent=m; toast.classList.add('show'); clearTimeout(tt);
      tt=setTimeout(()=>toast.classList.remove('show'),1800);}
    document.querySelectorAll('[data-name]').forEach(el=>{
      el.addEventListener('click',()=>{showToast(el.dataset.name); if(navigator.vibrate)navigator.vibrate(12);});
    });
  </script>
</body>
</html>
