<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tailg BLE App · 首页重设计 v3 暗色仪表盘</title>
  <style>
    :root {
      --bg-deep: #0A0B0E;
      --bg-surface: #121418;
      --bg-card: #181A1F;
      --bg-card-hover: #1E2026;
      --bg-glass: rgba(24, 26, 31, 0.85);
      --border-subtle: rgba(255,255,255,0.06);
      --border-card: rgba(255,255,255,0.08);
      --text-primary: #F0F0F3;
      --text-secondary: #9899A0;
      --text-tertiary: #6A6B71;
      --accent-teal: #00D4B8;
      --accent-teal-glow: rgba(0,212,184,0.2);
      --accent-red: #FF4757;
      --accent-red-glow: rgba(255,71,87,0.2);
      --accent-amber: #FFB800;
      --accent-amber-glow: rgba(255,184,0,0.2);
      --battery-high: #00D4B8;
      --battery-mid: #FFB800;
      --battery-low: #FF4757;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --radius-pill: 999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: #1A1C22;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .phone {
      width: 390px;
      height: 820px;
      border-radius: 44px;
      background: var(--bg-deep);
      box-shadow: 0 0 0 6px #1A1C22, 0 0 0 8px #2A2D33, 0 40px 80px rgba(0,0,0,.6);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .island {
      position: absolute;
      z-index: 20;
      top: 8px;
      left: 50%;
      width: 120px;
      height: 32px;
      transform: translateX(-50%);
      background: #000;
      border-radius: 20px;
    }

    .app {
      flex: 1;
      padding-top: 44px;
      overflow-y: auto;
      scrollbar-width: none;
      padding-bottom: 60px;
      position: relative;
    }
    .app::-webkit-scrollbar { display: none; }

    .screen-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .screen-bg .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
    }
    .screen-bg .orb-1 {
      width: 240px; height: 240px;
      background: var(--accent-teal);
      top: -40px; right: -60px;
    }
    .screen-bg .orb-2 {
      width: 180px; height: 180px;
      background: var(--accent-teal);
      bottom: 120px; left: -40px;
      opacity: 0.08;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px 12px;
    }
    .top-bar .vehicle {
      flex: 1;
      min-width: 0;
    }
    .top-bar .vehicle .name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .top-bar .vehicle .name .caret {
      font-size: 14px;
      color: var(--text-tertiary);
    }
    .top-bar .vehicle .sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .top-bar .vehicle .sub .ble-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-teal);
      box-shadow: 0 0 4px var(--accent-teal);
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 28px;
      padding: 0 12px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 700;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .status-chip.online {
      background: rgba(0,212,184,0.12);
      color: var(--accent-teal);
    }
    .status-chip .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-teal);
      box-shadow: 0 0 6px var(--accent-teal-glow);
      animation: statusPulse 1.8s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent-teal-glow); }
      50% { opacity: 0.4; box-shadow: 0 0 2px var(--accent-teal-glow); }
    }

    .icon-btn-sm {
      width: 38px; height: 38px;
      border: 0;
      border-radius: 50%;
      background: var(--bg-card);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .15s ease;
      color: var(--text-secondary);
      flex: 0 0 auto;
    }
    .icon-btn-sm:active { transform: scale(.93); background: var(--bg-card-hover); }
    .icon-btn-sm svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Battery Gauge Section ── */
    .gauge-section {
      display: flex;
      justify-content: center;
      padding: 4px 0 0;
    }
    .gauge-wrap {
      position: relative;
      width: 260px; height: 190px;
    }
    .gauge-wrap svg { position: absolute; inset: 0; }

    .gauge-center {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .gauge-center .battery-num {
      font-size: 64px;
      font-weight: 200;
      line-height: 1;
      letter-spacing: -3px;
      color: var(--text-primary);
      transition: color .6s ease;
    }
    .gauge-center .battery-num.high { color: var(--battery-high); }
    .gauge-center .battery-num.mid { color: var(--battery-amber); }
    .gauge-center .battery-num.low { color: var(--battery-low); }
    .gauge-center .battery-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-top: -2px;
      letter-spacing: 1px;
    }
    .gauge-center .range-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .gauge-center .range-text b {
      font-weight: 700;
      color: var(--text-primary);
    }

    /* Gauge ticks */
    .gauge-ticks {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── Vehicle Visual ── */
    .vehicle-visual {
      position: relative;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -8px 0 8px;
    }
    .vehicle-visual .glow {
      position: absolute;
      bottom: 0;
      width: 160px; height: 20px;
      background: radial-gradient(ellipse, rgba(0,212,184,.12), transparent 70%);
    }

    /* ── State Chips ── */
    .state-row {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .state-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 28px;
      padding: 0 12px;
      border-radius: var(--radius-pill);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .state-chip.danger {
      border-color: rgba(255,71,87,.2);
      color: var(--accent-red);
      background: rgba(255,71,87,.08);
    }
    .state-chip.teal {
      border-color: rgba(0,212,184,.2);
      color: var(--accent-teal);
      background: rgba(0,212,184,.08);
    }
    .state-chip .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── Main Dual Control ── */
    .dual-control {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 20px;
    }
    .control-card {
      height: 104px;
      border-radius: var(--radius-lg);
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-card);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all .2s ease;
      user-select: none;
    }
    .control-card:active { transform: scale(.97); border-color: rgba(255,255,255,.12); }
    .control-card .glow-spot {
      position: absolute;
      border-radius: 50%;
      filter: blur(30px);
      opacity: 0;
      transition: opacity .3s ease;
    }
    .control-card:active .glow-spot { opacity: .6; }
    .control-card .thumb {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1E2128, #16181D);
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      place-items: center;
      transition: left .5s cubic-bezier(.25,.8,.25,1.2);
      z-index: 2;
    }
    .control-card .thumb svg {
      width: 30px; height: 30px;
      stroke: var(--text-primary);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .control-card .label-area {
      position: absolute;
      top: 50%;
      left: 92px;
      right: 16px;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .control-card .label-area .main-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
      text-align: center;
    }
    .control-card .label-area .arrows {
      font-size: 13px;
      color: var(--text-tertiary);
      text-align: center;
      letter-spacing: 2px;
    }
    .control-card .label-area .hint {
      font-size: 10px;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 2px;
    }

    /* Progress ring on thumb */
    .control-card .progress-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .control-card .progress-overlay .ring {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      width: 72px; height: 72px;
      border-radius: 20px;
      border: 2px solid transparent;
    }
    .control-card.executing .ring {
      border-color: rgba(0,212,184,.6);
    }

    /* ── Quick Grid ── */
    .section-label {
      padding: 0 20px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 20px;
      margin-bottom: 16px;
    }
    .quick-tile {
      height: 72px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all .15s ease;
    }
    .quick-tile:active { transform: scale(.95); background: var(--bg-card-hover); }
    .quick-tile .tile-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
    }
    .quick-tile .tile-icon.teal { background: rgba(0,212,184,.12); color: var(--accent-teal); }
    .quick-tile .tile-icon.red { background: rgba(255,71,87,.12); color: var(--accent-red); }
    .quick-tile .tile-icon.violet { background: rgba(139,92,246,.12); color: #A78BFA; }
    .quick-tile .tile-icon.amber { background: rgba(255,184,0,.12); color: var(--accent-amber); }
    .quick-tile .tile-icon svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .quick-tile .tile-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* ── Service Cards ── */
    .service-scroll {
      display: flex;
      gap: 10px;
      padding: 0 20px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 24px;
    }
    .service-scroll::-webkit-scrollbar { display: none; }
    .service-card {
      flex: 0 0 auto;
      width: 110px;
      height: 110px;
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      transition: all .15s ease;
    }
    .service-card:active { transform: scale(.95); background: var(--bg-card-hover); }
    .service-card .sc-top {
      width: 36px; height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
    }
    .service-card .sc-top.teal { background: rgba(0,212,184,.12); color: var(--accent-teal); }
    .service-card .sc-top.violet { background: rgba(139,92,246,.12); color: #A78BFA; }
    .service-card .sc-top.amber { background: rgba(255,184,0,.12); color: var(--accent-amber); }
    .service-card .sc-top.blue { background: rgba(96,165,250,.12); color: #60A5FA; }
    .service-card .sc-top.red { background: rgba(255,71,87,.12); color: var(--accent-red); }
    .service-card .sc-top svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .service-card .sc-label { font-size: 12px; font-weight: 700; color: var(--text-primary); }
    .service-card .sc-sub { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-subtle);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      z-index: 10;
    }
    .bottom-nav button {
      border: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: var(--text-tertiary);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      transition: color .15s ease;
    }
    .bottom-nav button.active { color: var(--accent-teal); }
    .bottom-nav button.active::before {
      content: "";
      position: absolute;
      top: -1px;
      width: 24px; height: 2px;
      background: var(--accent-teal);
      border-radius: 999px;
    }
    .bottom-nav button svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* Responsive */
    @media (max-width: 440px) {
      body { padding: 0; }
      .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
      .island { display: none; }
    }
  </style>
</head>
<body>

<div class="phone">
  <div class="island"></div>
  <div class="app">
    <div class="screen-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
    </div>
    <div class="content">

      <!-- Top Bar -->
      <div class="top-bar">
        <div class="vehicle">
          <div class="name">Tailg-001 <span class="caret">▾</span></div>
          <div class="sub"><span class="ble-dot"></span> BLE · 515 MTU</div>
        </div>
        <span class="status-chip online"><span class="pulse"></span>在线</span>
        <button class="icon-btn-sm" aria-label="通知">
          <svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0v5l1.5 3h-15L6 13V8z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>
        </button>
      </div>

      <!-- Battery Gauge -->
      <div class="gauge-section">
        <div class="gauge-wrap">
          <svg viewBox="0 0 260 200" aria-hidden="true">
            <defs>
              <linearGradient id="gaugeGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#00D4B8" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#00D4B8" stop-opacity="0.2"/>
              </linearGradient>
            </defs>
            <path d="M50 160 A104 104 0 0 1 210 160" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="20" stroke-linecap="round"/>
            <path d="M50 160 A104 104 0 0 1 186 85" fill="none" stroke="url(#gaugeGrad)" stroke-width="20" stroke-linecap="round" stroke-dasharray="320" stroke-dashoffset="48" style="transition: stroke-dashoffset 1s ease;"/>

            <line x1="130" y1="52" x2="129" y2="88" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <circle cx="130" cy="52" r="2" fill="rgba(255,255,255,0.3)"/>
          </svg>
          <div class="gauge-center">
            <div class="battery-num high" id="batteryNum">85<tspan style="font-size:24px;font-weight:400">%</tspan></div>
            <div class="battery-label">剩余电量</div>
            <div class="range-text">可行驶 <b>55 km</b></div>
          </div>
        </div>
      </div>

      <!-- Vehicle Visual -->
      <div class="vehicle-visual">
        <div class="glow"></div>
        <svg viewBox="0 0 280 90" width="240" height="77" aria-hidden="true">
          <!-- Wheels -->
          <circle cx="66" cy="68" r="18" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="5"/>
          <circle cx="214" cy="68" r="18" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="5"/>
          <circle cx="66" cy="68" r="8" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
          <circle cx="214" cy="68" r="8" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
          <!-- Body -->
          <path d="M60 68 L110 30 L170 30 L220 68" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Seat -->
          <path d="M115 32 L135 18 L145 18 L165 32" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Battery block -->
          <rect x="124" y="36" width="32" height="18" rx="5" fill="none" stroke="rgba(0,212,184,0.3)" stroke-width="2"/>
          <rect x="128" y="40" width="8" height="10" rx="2" fill="rgba(0,212,184,0.25)"/>
          <rect x="139" y="40" width="6" height="10" rx="2" fill="rgba(0,212,184,0.18)"/>
          <rect x="148" y="40" width="5" height="10" rx="2" fill="rgba(0,212,184,0.12)"/>
          <!-- Handlebars -->
          <path d="M170 32 L210 18" stroke="rgba(255,255,255,0.12)" stroke-width="5" stroke-linecap="round"/>
          <path d="M90 38 L70 16" stroke="rgba(255,255,255,0.12)" stroke-width="5" stroke-linecap="round"/>
          <!-- Headlight -->
          <circle cx="215" cy="42" r="5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
          <circle cx="215" cy="42" r="2" fill="rgba(0,212,184,0.18)"/>
        </svg>
      </div>

      <!-- State Chips -->
      <div class="state-row">
        <span class="state-chip danger"><span class="dot"></span> 已设防</span>
        <span class="state-chip"><span class="dot" style="color:var(--text-tertiary)"></span> 未通电</span>
        <span class="state-chip teal"><span class="dot"></span> GPS 定位中</span>
      </div>

      <!-- Dual Control -->
      <div class="dual-control">
        <div class="control-card" id="slideUnlock">
          <div class="glow-spot" style="background:var(--accent-teal);width:60px;height:60px;left:-10px;top:22px"></div>
          <div class="thumb">
            <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0"/></svg>
          </div>
          <div class="label-area">
            <div class="main-label">解锁</div>
            <div class="arrows">› › ›</div>
            <div class="hint">右滑解除设防</div>
          </div>
        </div>
        <div class="control-card" id="slidePower">
          <div class="glow-spot" style="background:var(--accent-teal);width:60px;height:60px;right:-10px;top:22px"></div>
          <div class="thumb">
            <svg viewBox="0 0 24 24"><path d="M12 3v9"/><path d="M5.6 7.6a8 8 0 1 0 12.8 0"/></svg>
          </div>
          <div class="label-area">
            <div class="main-label">通电</div>
            <div class="arrows" style="direction:rtl">‹ ‹ ‹</div>
            <div class="hint">左滑启动电源</div>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="section-label">快捷操作</div>
      <div class="quick-grid">
        <div class="quick-tile">
          <div class="tile-icon red"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0"/></svg></div>
          <span class="tile-label">设防</span>
        </div>
        <div class="quick-tile">
          <div class="tile-icon teal"><svg viewBox="0 0 24 24"><path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5L7 9H4a1 1 0 0 0-1 1z"/><path d="M16 8a5 5 0 0 1 0 8"/></svg></div>
          <span class="tile-label">寻车</span>
        </div>
        <div class="quick-tile">

<script>
  // Dual slide control
  ['slideUnlock', 'slidePower'].forEach(id => {
    const card = document.getElementById(id);
    const thumb = card.querySelector('.thumb');
    const isLeft = id === 'slidePower';
    let isDown = false, startX = 0, currentX = 10;
    const maxX = isLeft ? 10 : 178;

    const clamp = (v) => Math.max(10, Math.min(maxX, v));

    card.addEventListener('mousedown', e => { isDown = true; startX = e.clientX; card.style.cursor = 'grabbing'; });
    card.addEventListener('touchstart', e => { isDown = true; startX = e.touches[0].clientX; card.style.cursor = 'grabbing'; }, {passive:true});

    document.addEventListener('mousemove', e => {
      if (!isDown) return;
      const dx = isLeft ? (startX - e.clientX) : (e.clientX - startX);
      currentX = clamp(10 + dx);
      thumb.style.left = currentX + 'px';
      const progress = (currentX - 10) / (maxX - 10);
      if (progress > 0.85) {
        thumb.style.left = maxX + 'px';
        card.classList.add('executing');
        setTimeout(() => {
          card.classList.remove('executing');
          thumb.style.left = '10px';
          currentX = 10;
        }, 1200);
        isDown = false;
        card.style.cursor = 'grab';
      }
    });
    document.addEventListener('touchmove', e => {
      if (!isDown) return;
      const dx = isLeft ? (startX - e.touches[0].clientX) : (e.touches[0].clientX - startX);
      currentX = clamp(10 + dx);
      thumb.style.left = currentX + 'px';
      const progress = (currentX - 10) / (maxX - 10);
      if (progress > 0.85) {
        thumb.style.left = maxX + 'px';
        card.classList.add('executing');
        setTimeout(() => {
          card.classList.remove('executing');
          thumb.style.left = '10px';
          currentX = 10;
        }, 1200);
        isDown = false;
        card.style.cursor = 'grab';
      }
    }, {passive:true});
    document.addEventListener('mouseup', () => {
      if (!isDown) return;
      const progress = (currentX - 10) / (maxX - 10);
      if (progress < 0.85) { thumb.style.left = '10px'; currentX = 10; }
      isDown = false;
      card.style.cursor = 'grab';
    });
    document.addEventListener('touchend', () => {
      if (!isDown) return;
      const progress = (currentX - 10) / (maxX - 10);
      if (progress < 0.85) { thumb.style.left = '10px'; currentX = 10; }
      isDown = false;
      card.style.cursor = 'grab';
    });
  });

  // Simulate battery changes on tap
  const batNum = document.getElementById('batteryNum');
  let batLevel = 85;
  batNum.addEventListener('click', () => {
    const levels = [85, 42, 12, 85];
    const classes = ['high', 'mid', 'low', 'high'];
    const idx = [85,42,12,85].indexOf(batLevel);
    const next = (idx + 1) % 4;
    batLevel = levels[next];
    batNum.className = 'battery-num ' + classes[next];
    batNum.innerHTML = batLevel + '<tspan style="font-size:24px;font-weight:400">%</tspan>';

    const gaugePath = document.querySelector('.gauge-wrap path[stroke-dasharray]');
    const offset = 320 - (320 * (batLevel / 100));
    gaugePath.setAttribute('stroke-dashoffset', offset);

    if (batLevel >= 60) gaugePath.setAttribute('stroke', 'url(#gaugeGrad)');
    else if (batLevel >= 20) gaugePath.setAttribute('stroke', '#FFB800');
    else gaugePath.setAttribute('stroke', '#FF4757');
  });
</script>
