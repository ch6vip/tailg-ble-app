<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台铃 · 我的 v8</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg-top:#E9EEF4; --bg-bot:#F6F8FB; --card:#FFFFFF; --card-2:#F2F5F8; --card-3:#E8ECF1;
      --hairline:rgba(15,22,32,0.07); --hairline-2:rgba(15,22,32,0.10);
      --energy:#00C896; --energy-deep:#00A57C; --energy-soft:rgba(0,200,150,0.12);
      --ink-btn:#1B2230; --ink-btn-2:#2A3342;
      --amber:#F5A623; --amber-soft:rgba(245,166,35,0.14);
      --red:#FF4D5E; --red-soft:rgba(255,77,94,0.12);
      --violet:#7C6CFF; --violet-soft:rgba(124,108,255,0.14);
      --sky:#2E9BFF; --sky-soft:rgba(46,155,255,0.14);
      --t-1:#0F1620; --t-2:#5A6472; --t-3:#98A1AE;
      --r-sm:14px; --r-md:20px; --r-lg:26px; --r-xl:32px; --r-pill:999px;
      --shadow-card:0 12px 36px rgba(24,39,64,0.10);
      --shadow-btn:0 8px 20px rgba(27,34,48,0.28);
      --ease:cubic-bezier(.4,.0,.2,1); --ease-out:cubic-bezier(.16,1,.3,1);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      background:#cfd6df; color:var(--t-1); display:flex; justify-content:center; min-height:100vh;
      -webkit-font-smoothing:antialiased;}
    .phone{position:relative; width:390px; min-height:844px; height:844px;
      background:radial-gradient(120% 56% at 50% -8%, rgba(0,200,150,0.12) 0%, transparent 48%),
      linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 38%); overflow:hidden;}
    .scroll{height:844px; overflow-y:auto; overflow-x:hidden; padding:0 0 110px;}
    .scroll::-webkit-scrollbar{display:none;}
    .pad{padding:0 20px;}

    .statusbar{display:flex; justify-content:space-between; align-items:center;
      padding:14px 24px 4px; font-size:13px; font-weight:600; color:var(--t-1);}
    .statusbar .ico{display:flex; gap:6px; align-items:center; font-size:12px;}

    /* ── 用户头部 ── */
    .profile-head{display:flex; align-items:center; gap:15px; padding:16px 0 8px;}
    .avatar{width:66px; height:66px; border-radius:50%; flex:0 0 auto; position:relative;
      background:linear-gradient(135deg,var(--energy),var(--energy-deep)); display:grid; place-items:center;
      box-shadow:0 8px 22px rgba(0,165,124,0.35);}
    .avatar span{font-size:26px; font-weight:800; color:#fff;}
    .avatar .ring{position:absolute; inset:-3px; border-radius:50%; border:2px solid rgba(255,255,255,0.6);}
    .pf-body{flex:1; min-width:0;}
    .pf-name{font-size:21px; font-weight:800; color:var(--t-1); display:flex; align-items:center; gap:8px;}
    .pf-vip{font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:var(--r-pill);
      background:linear-gradient(135deg,#FFD580,#F5A623); color:#5A3A00;}
    .pf-phone{font-size:13px; color:var(--t-2); margin-top:4px;}
    .pf-edit{width:38px; height:38px; border-radius:50%; display:grid; place-items:center;
      background:var(--card); border:1px solid var(--hairline); box-shadow:0 4px 14px rgba(24,39,64,0.08);
      transition:transform .14s var(--ease);}
    .pf-edit:active{transform:scale(.92);}
    .pf-edit svg{width:18px;height:18px;stroke:var(--t-2);fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}

    /* ── 数据概览卡 ── */
    .stat-card{display:flex; background:var(--card); border-radius:var(--r-lg);
      padding:18px 8px; margin-top:18px; box-shadow:var(--shadow-card); border:1px solid rgba(255,255,255,0.6);}
    .stat-card .si{flex:1; text-align:center; position:relative;}
    .stat-card .si + .si::before{content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
      width:1px; height:32px; background:var(--hairline);}
    .stat-card .sn{font-size:21px; font-weight:800; color:var(--t-1); letter-spacing:-.4px;}
    .stat-card .sn small{font-size:12px; font-weight:700; color:var(--t-3);}
    .stat-card .sl{font-size:11.5px; color:var(--t-3); margin-top:4px;}

    /* ── 会员权益横条 ── */
    .vip-bar{display:flex; align-items:center; gap:13px; margin-top:16px; padding:16px 18px;
      border-radius:var(--r-lg); background:linear-gradient(120deg,#222A3A,#1B2230); color:#fff;
      box-shadow:var(--shadow-btn); position:relative; overflow:hidden;
      transition:transform .14s var(--ease);}
    .vip-bar:active{transform:scale(.985);}
    .vip-bar .vg{position:absolute; right:-30px; top:-30px; width:130px; height:130px; border-radius:50%;
      background:radial-gradient(circle, rgba(245,166,35,0.3) 0%, transparent 70%);}
    .vip-bar .vic{width:42px;height:42px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;
      background:linear-gradient(135deg,#FFD580,#F5A623); position:relative; z-index:2;}
    .vip-bar .vic svg{width:22px;height:22px;stroke:#5A3A00;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .vip-bar .vbody{flex:1; position:relative; z-index:2;}
    .vip-bar .vt{font-size:15px;font-weight:800;}
    .vip-bar .vs{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px;}
    .vip-bar .varrow{font-size:12.5px;font-weight:700;color:#FFD580;position:relative;z-index:2;}

    /* ── 设置分组 ── */
    .group{background:var(--card); border-radius:var(--r-lg); margin-top:16px; overflow:hidden;
      box-shadow:0 6px 20px rgba(24,39,64,0.06); border:1px solid var(--hairline);}
    .row{display:flex; align-items:center; gap:14px; padding:15px 18px; cursor:pointer;
      transition:background .15s;}
    .row:active{background:var(--card-2);}
    .row + .row{border-top:1px solid var(--hairline);}
    .row .r-ic{width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;}
    .row .r-ic svg{width:19px;height:19px;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
    .row .r-lab{flex:1; font-size:15px; font-weight:600; color:var(--t-1);}
    .row .r-val{font-size:13px; color:var(--t-3);}
    .row .r-arrow{color:var(--t-3); font-size:17px; margin-left:2px;}
    .row .r-badge{background:var(--red); color:#fff; font-size:10px; font-weight:700;
      padding:2px 7px; border-radius:var(--r-pill);}

    .grp-title{font-size:13px; font-weight:700; color:var(--t-2); margin:24px 4px 10px;}

    /* 退出 */
    .logout{margin-top:20px; height:52px; border-radius:var(--r-md); display:flex; align-items:center;
      justify-content:center; gap:8px; font-size:15px; font-weight:700; color:var(--red);
      background:var(--card); border:1px solid var(--hairline); box-shadow:0 6px 20px rgba(24,39,64,0.06);
      transition:transform .14s var(--ease);}
    .logout:active{transform:scale(.98);}
    .logout svg{width:18px;height:18px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

    /* ── 底部导航 ── */
    .nav{position:absolute; left:0; right:0; bottom:0; height:84px; z-index:30;
      background:linear-gradient(to top, var(--bg-bot) 36%, transparent);
      display:flex; align-items:flex-start; justify-content:center; pointer-events:none;}
    .nav-inner{margin-top:10px; width:340px; height:60px; pointer-events:auto;
      background:rgba(255,255,255,0.86); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      border:1px solid var(--hairline); border-radius:22px;
      display:flex; align-items:center; justify-content:space-around; padding:0 8px;
      box-shadow:var(--shadow-card);}
    .nav-item{display:flex; flex-direction:column; align-items:center; gap:4px;
      color:var(--t-3); font-size:11px; font-weight:600; flex:1; padding:8px 0; text-decoration:none;}
    .nav-item svg{width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.9;
      stroke-linecap:round; stroke-linejoin:round;}
    .nav-item.on{color:var(--energy-deep);}

    .toast{position:absolute; top:64px; left:50%; transform:translateX(-50%) translateY(-80px);
      background:var(--ink-btn); color:#fff; padding:11px 18px; border-radius:var(--r-pill);
      font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px;
      box-shadow:0 12px 30px rgba(24,39,64,0.3); opacity:0;
      transition:all .35s var(--ease-out); z-index:50; pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0); opacity:1;}
    .toast .tdot{width:8px;height:8px;border-radius:50%;background:var(--energy);box-shadow:0 0 8px var(--energy);}
  </style>
</head>
<body>

        <!-- 通用设置 -->

        <div class="group">

    <!-- 底部导航 -->

    <div class="toast" id="toast"><span class="tdot"></span><span id="toastMsg"></span></div>

  <script>
    const toast=document.getElementById('toast'), toastMsg=document.getElementById('toastMsg'); let tt;
    function showToast(m){toastMsg.textContent=m; toast.classList.add('show'); clearTimeout(tt);
      tt=setTimeout(()=>toast.classList.remove('show'),1800);}
    document.querySelectorAll('[data-name]').forEach(el=>{
      el.addEventListener('click',()=>{showToast(el.dataset.name); if(navigator.vibrate)navigator.vibrate(12);});
    });
  </script>
</body>
