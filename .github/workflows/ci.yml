# ───────────────────────────────────────────
# Tailg BLE App — CI/CD Pipeline
# ───────────────────────────────────────────
# 覆盖：格式检查 → 静态分析 → 单元测试+覆盖率 → 构建 → 部署 → 通知
#
# 触发规则：
#   push 到 master/develop         → 完整 CI + 构建 + 部署
#   push 标签 v*                   → 完整 CI + 构建 + 生产发布
#   pull_request 到 master/develop → 格式 + 分析 + 测试 + 调试构建
#   workflow_dispatch              → 手动触发，可选目标环境

name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master, develop]
  workflow_dispatch:
    inputs:
      deploy-target:
        description: '部署目标环境'
        required: false
        type: choice
        options:
          - none
          - staging
          - production
        default: none

# ── 并发控制：同一 ref 的新运行自动取消旧运行 ──
concurrency:
  group: cicd-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

# ── 全局环境变量 ──
env:
  FLUTTER_VERSION: '3.32.1'
  APK_DEBUG_PATH: build/app/outputs/flutter-apk/app-debug.apk
  APK_RELEASE_PATH: build/app/outputs/flutter-apk/app-release.apk

jobs:
  # ╔══════════════════════════════════════════════════════════════╗
  # ║  Stage 1 — Quality Gates（并行执行）                        ║
  # ╚══════════════════════════════════════════════════════════════╝

  # ── 1a. 代码格式检查 ──
  format:
    name: 'Format Check'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .

  # ── 1b. 静态代码分析 ──
  analyze:
    name: 'Static Analysis'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  Stage 2 — Tests & Coverage（依赖 Stage 1 全部通过）       ║
  # ╚══════════════════════════════════════════════════════════════╝

  test:
    name: 'Unit Tests & Coverage'
    needs: [format, analyze]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 运行全部测试并生成 LCOV 覆盖率文件
      - name: Run tests with coverage
        run: flutter test --coverage

      # 上传覆盖率到 Codecov（token 可选，公开仓库不需要）
      - name: Upload coverage to Codecov
        if: success() || failure()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # 保存覆盖率原始报告作为构件的工件
      - name: Upload coverage artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

      # 在运行摘要中输出覆盖率概况
      - name: Post coverage summary
        if: success() || failure()
        run: |
          echo '### :bar_chart: Test Coverage Summary' >> "$GITHUB_STEP_SUMMARY"
          echo '| Metric | Value |' >> "$GITHUB_STEP_SUMMARY"
          echo '|--------|-------|' >> "$GITHUB_STEP_SUMMARY"
          echo "| Test files | $(find test -name '*_test.dart' | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/lcov.info ]; then
            LINES=$(grep -c '^DA:' coverage/lcov.info || echo 0)
            HIT=$(grep '^DA:' coverage/lcov.info | grep -cE ',(0|[1-9][0-9]*)$' || echo 0)
            echo "| Instrumented lines | ${LINES} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '| Coverage report | [Codecov](https://app.codecov.io/gh/${{ github.repository }}) |' >> "$GITHUB_STEP_SUMMARY"

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  Stage 3 — Build Artifacts（依赖 Stage 2 通过）           ║
  # ║  按分支/标签条件选择不同的构建 profile                     ║
  # ╚══════════════════════════════════════════════════════════════╝

  # ── 3a. 调试 APK（develop 分支 / PR） ──
  build-debug:
    name: 'Build Debug APK'
    needs: test
    if: |
      github.ref == 'refs/heads/develop' ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Gradle 依赖缓存 — 大幅加快重复构建
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Generate SHA-256 checksum
        run: sha256sum "${{ env.APK_DEBUG_PATH }}" > "${{ env.APK_DEBUG_PATH }}.sha256"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: |
            ${{ env.APK_DEBUG_PATH }}
            ${{ env.APK_DEBUG_PATH }}.sha256
          retention-days: 7
          if-no-files-found: error

  # ── 3b. 签名发布 APK（master 分支 / 标签 v*） ──
  build-release:
    name: 'Build Release APK'
    needs: test
    if: |
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 从 Secrets 解码签名密钥（Base64）
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          : "${KEYSTORE_BASE64:?KEYSTORE_BASE64 secret is required for signed release builds}"
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Create signing properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          : "${KEYSTORE_PASSWORD:?KEYSTORE_PASSWORD secret is required}"
          : "${KEY_PASSWORD:?KEY_PASSWORD secret is required}"
          : "${KEY_ALIAS:?KEY_ALIAS secret is required}"
          printf '%s\n' \
            "storePassword=$KEYSTORE_PASSWORD" \
            "keyPassword=$KEY_PASSWORD" \
            "keyAlias=$KEY_ALIAS" \
            "storeFile=../../release.keystore" \
            > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Generate SHA-256 checksum
        run: sha256sum "${{ env.APK_RELEASE_PATH }}" > "${{ env.APK_RELEASE_PATH }}.sha256"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: |
            ${{ env.APK_RELEASE_PATH }}
            ${{ env.APK_RELEASE_PATH }}.sha256
          retention-days: 30
          if-no-files-found: error

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  Stage 4 — Deploy（依赖 Stage 3 构建成功）                 ║
  # ║  按分支 → 目标环境的映射关系：                             ║
  # ║    develop  → development                                  ║
  # ║    master   → staging                                      ║
  # ║    tag v*   → production (GitHub Release)                  ║
  # ╚══════════════════════════════════════════════════════════════╝

  # ── 4a. 部署到开发环境 ──
  deploy-development:
    name: 'Deploy → Development'
    needs: build-debug
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: development
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: artifacts

      - name: Deploy to development
        id: deploy
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEV_DEPLOY_WEBHOOK_URL }}
        run: |
          echo "### :rocket: Development Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK:** $(ls artifacts/*.apk)" >> "$GITHUB_STEP_SUMMARY"
          echo "url=https://dev-distribution.internal/$(basename artifacts/*.apk)" >> "$GITHUB_OUTPUT"

  # ── 4b. 部署到预发布环境 ──
  deploy-staging:
    name: 'Deploy → Staging'
    needs: build-release
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: artifacts

      - name: Deploy to staging
        id: deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_STAGING }}
        run: |
          # ── Firebase App Distribution（如已配置） ──
          if [ -n "$FIREBASE_TOKEN" ] && [ -n "$FIREBASE_APP_ID" ]; then
            APK_FILE=$(ls artifacts/*.apk | head -1)
            echo "Deploying $APK_FILE to Firebase App Distribution..."
            # 需要安装 firebase-tools：npm i -g firebase-tools
            # firebase appdistribution:distribute "$APK_FILE" \
            #   --app "$FIREBASE_APP_ID" \
            #   --release-notes "Build from ${{ github.ref_name }} (${{ github.sha }})" \
            #   --groups "testers"
            echo "url=https://appdistribution.firebase.dev/i/$FIREBASE_APP_ID" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi
          echo "### :package: Staging Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK:** $(ls artifacts/*.apk)" >> "$GITHUB_STEP_SUMMARY"

  # ── 4c. 生产发布（标签 v*） → 创建 GitHub Release ──
  deploy-production:
    name: 'Deploy → Production'
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    permissions:
      contents: write     # 创建 Release 需要

    steps:
      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: artifacts

      # 创建 GitHub Release 并上传 APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## :package: APK Artifact
            | 文件 | SHA-256 |
            |------|---------|
            | $(basename $(ls artifacts/*.apk)) | $(cat artifacts/*.sha256 2>/dev/null | awk '{print $1}' || echo 'N/A') |

            > 构建来源: ${{ github.ref_name }} (${{ github.sha }})

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  Stage 5 — Notifications（始终运行，依赖全部上游 job）     ║
  # ╚══════════════════════════════════════════════════════════════╝

  # ── 5a. 失败通知（仅上游有失败时触发） ──
  notify-failure:
    name: 'Failure Notification'
    needs:
      [format, analyze, test, build-debug, build-release,
       deploy-development, deploy-staging, deploy-production]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post failure summary
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo '## :x: CI/CD Pipeline Failed' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Detail | Value |' >> "$GITHUB_STEP_SUMMARY"
          echo '|--------|-------|' >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | ${{ github.repository }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflow Run | [View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> "$GITHUB_STEP_SUMMARY"

      # Telegram 通知（失败）
      - name: Notify via Telegram
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *CI/CD Pipeline Failed*
            ━━━━━━━━━━━━━━━━━
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Trigger:* ${{ github.event_name }}
            ━━━━━━━━━━━━━━━━━
            [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      # Slack 通知（如已配置 SLACK_WEBHOOK_URL）
      - name: Notify via Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: ":x: CI/CD Pipeline Failed — ${{ github.repository }} @ ${{ github.ref_name }}"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: ":x: CI/CD Pipeline Failed"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repository*\n${{ github.repository }}"
                  - type: mrkdwn
                    text: "*Branch*\n${{ github.ref_name }}"
                  - type: mrkdwn
                    text: "*Commit*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|\`${{ github.sha }}\`>"
                  - type: mrkdwn
                    text: "*Trigger*\n${{ github.event_name }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: ":github: View Workflow Run"
                    url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── 5b. 成功汇总 ──
  notify-success:
    name: 'Success Summary'
    needs:
      [format, analyze, test, build-debug, build-release,
       deploy-development, deploy-staging, deploy-production]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Telegram 通知（成功 — 仅无失败且无取消时发送）
      - name: Notify via Telegram
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *CI/CD Pipeline Passed*
            ━━━━━━━━━━━━━━━━━
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Trigger:* ${{ github.event_name }}
            ━━━━━━━━━━━━━━━━━
            [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Post success summary
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          echo '## :white_check_mark: CI/CD Pipeline Passed' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Stage | Status |' >> "$GITHUB_STEP_SUMMARY"
          echo '|-------|--------|' >> "$GITHUB_STEP_SUMMARY"
          echo '| Format Check | :heavy_check_mark: |' >> "$GITHUB_STEP_SUMMARY"
          echo '| Static Analysis | :heavy_check_mark: |' >> "$GITHUB_STEP_SUMMARY"
          echo '| Unit Tests | :heavy_check_mark: |' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.ref }}" = "refs/heads/develop" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            echo '| Build Debug APK | :heavy_check_mark: |' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ github.ref }}" = "refs/heads/master" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo '| Build Release APK | :heavy_check_mark: |' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo "[View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
