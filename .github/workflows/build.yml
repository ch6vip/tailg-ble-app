name: Build APK

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.32.1'
  APK_PATH: build/app/outputs/flutter-apk/app-release.apk
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-warnings --fatal-infos

      - name: Test
        run: flutter test --coverage

      - name: Check coverage
        run: dart tool/check_coverage.dart coverage/lcov.info 40

  build:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          : "${KEYSTORE_BASE64:?KEYSTORE_BASE64 secret is required for signed Actions APKs}"
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          : "${KEYSTORE_PASSWORD:?KEYSTORE_PASSWORD secret is required for signed Actions APKs}"
          : "${KEY_PASSWORD:?KEY_PASSWORD secret is required for signed Actions APKs}"
          : "${KEY_ALIAS:?KEY_ALIAS secret is required for signed Actions APKs}"
          printf '%s\n' \
            "storePassword=$KEYSTORE_PASSWORD" \
            "keyPassword=$KEY_PASSWORD" \
            "keyAlias=$KEY_ALIAS" \
            "storeFile=../../release.keystore" \
            > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Generate checksum
        run: sha256sum "${{ env.APK_PATH }}" > "${{ env.APK_PATH }}.sha256"

      - uses: actions/upload-artifact@v5
        with:
          name: tailg-ble-${{ github.ref_name }}-${{ github.sha }}
          path: |
            ${{ env.APK_PATH }}
            ${{ env.APK_PATH }}.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
